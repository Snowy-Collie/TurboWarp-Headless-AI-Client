<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Game Development Workstation Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --container-bg: rgba(17, 24, 39, 0.7);
            --border-color: rgba(255, 255, 255, 0.08);
            --accent-glow: #00f2fe;
            --accent-bg: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --text-primary: #ffffff;
            --text-secondary: #9ca3af;
            --success-color: #10b981;
            --error-color: #ef4444;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            margin: 0;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            background-image: radial-gradient(circle at 50% 0%, rgba(79, 172, 254, 0.12) 0%, transparent 50%);
        }

        .container {
            width: 100%;
            max-width: 780px;
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 20px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin: 0;
            background: var(--accent-bg);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--success-color);
            background: rgba(16, 185, 129, 0.1);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success-color);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success-color);
        }

        .btn {
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            color: #000;
            background: var(--accent-bg);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px 0 rgba(0, 242, 254, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(0, 242, 254, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .window-section {
            margin-top: 20px;
        }

        .window-section h2 {
            font-size: 18px;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 15px;
            color: var(--text-secondary);
        }

        .window-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .no-windows {
            text-align: center;
            padding: 40px 20px;
            border: 1px dashed var(--border-color);
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 15px;
        }

        .window-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: border-color 0.3s ease;
        }

        .window-card:hover {
            border-color: rgba(0, 242, 254, 0.4);
        }

        .window-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .window-id {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #4facfe;
            text-transform: uppercase;
        }

        .window-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .window-targets {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .btn-close {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-close:hover {
            background: var(--error-color);
            color: #fff;
        }

        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 13px;
            color: var(--text-secondary);
            width: 100%;
            max-width: 780px;
            padding: 10px;
        }

        code {
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            color: var(--accent-glow);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div>
                <h1>AI Workstation Console</h1>
                <div style="font-size: 13px; color: var(--text-secondary); margin-top: 4px;">
                    Multi-Window Project Management Hub
                </div>
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                API Port 8080 Active
            </div>
        </header>

        <div style="display: flex; justify-content: flex-end; margin-bottom: 25px;">
            <button class="btn" id="btn-create">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="5" x2="12" y2="19"></line>
                    <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
                Launch New Workspace Window
            </button>
        </div>

        <div class="window-section">
            <h2>Active Workstation Windows</h2>
            <div class="window-list" id="window-list">
                <div class="no-windows">
                    No active workspace windows. Click button above to launch one.
                </div>
            </div>
        </div>
    </div>

    <footer>
        AI developer agent endpoint: <code>http://localhost:8080/environment?windowId=YOUR_WINDOW_ID</code>
    </footer>

    <script>
        const { ipcRenderer } = require('electron');

        const windowListContainer = document.getElementById('window-list');
        const btnCreate = document.getElementById('btn-create');

        function renderWindows(windows) {
            if (!windows || windows.length === 0) {
                windowListContainer.innerHTML = `
                    <div class="no-windows">
                        No active workspace windows. Click button above to launch one.
                    </div>
                `;
                return;
            }

            windowListContainer.innerHTML = windows.map(win => {
                const targetNames = win.targets && win.targets.length > 0 
                    ? win.targets.map(t => t.name).join(', ') 
                    : 'None';
                return `
                    <div class="window-card">
                        <div class="window-info">
                            <div class="window-id">${win.windowId}</div>
                            <div class="window-title">${win.title}</div>
                            <div class="window-targets">Sprites: <span>${targetNames}</span></div>
                        </div>
                        <button class="btn-close" onclick="closeWindow('${win.windowId}')">Close Window</button>
                    </div>
                `;
            }).join('');
        }

        function closeWindow(windowId) {
            ipcRenderer.send('close-window', windowId);
        }

        btnCreate.addEventListener('click', () => {
            ipcRenderer.send('create-new-window');
        });

        // Initialize and listen for updates
        ipcRenderer.invoke('get-active-windows').then(renderWindows);

        ipcRenderer.on('active-windows-updated', (event, windows) => {
            renderWindows(windows);
        });
    </script>
</body>
</html>
